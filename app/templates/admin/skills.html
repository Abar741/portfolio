{% extends "admin/base.html" %}

{% block content %}

<h2>Skills Manager</h2>

<form method="POST" class="mb-3">
<input name="name" placeholder="Skill">
<input name="percentage" placeholder="%">
<button>Add</button>
</form>

<ul>
{% for skill in skills %}
<li>{{ skill.name }} - {{ skill.percentage }}%</li>
{% endfor %}
</ul>

{% endblock %}
