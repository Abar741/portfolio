<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Portfolio</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-container {
            text-align: center;
            color: white;
            max-width: 600px;
            padding: 2rem;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .error-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .error-description {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .btn-home {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: #764ba2;
        }
        
        .search-box {
            margin: 2rem 0;
        }
        
        .search-box input {
            border-radius: 25px;
            padding: 12px 20px;
            border: none;
            width: 300px;
            max-width: 100%;
        }
        
        .search-box button {
            border-radius: 25px;
            padding: 12px 20px;
            margin-left: 10px;
            background: white;
            color: #667eea;
            border: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-description">
            Oops! The page you're looking for seems to have vanished into the digital void.
        </p>
        
        <div class="search-box">
            <form action="/" method="GET">
                <input type="text" name="search" placeholder="Search for projects...">
                <button type="submit">Search</button>
            </form>
        </div>
        
        <div class="action-links">
            <a href="/" class="btn-home me-3">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
            <a href="/projects" class="btn-home">
                <i class="fas fa-folder-open me-2"></i>View Projects
            </a>
        </div>
        
        <div class="mt-4">
            <p class="small opacity-75">
                Or try these popular pages:
            </p>
            <div class="d-flex justify-content-center flex-wrap">
                <a href="/about" class="text-white text-decoration-none me-3 mb-2">
                    <i class="fas fa-user me-1"></i>About
                </a>
                <a href="/projects" class="text-white text-decoration-none me-3 mb-2">
                    <i class="fas fa-code me-1"></i>Projects
                </a>
                <a href="/#contact" class="text-white text-decoration-none mb-2">
                    <i class="fas fa-envelope me-1"></i>Contact
                </a>
            </div>
        </div>
    </div>
</body>
</html>
