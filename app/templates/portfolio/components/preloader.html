<!-- Professional Preloader Component -->
<style>
/* ===== PROFESSIONAL PRELOADER ===== */
.preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s ease;
}

.preloader.fade-out {
    opacity: 0;
    visibility: hidden;
}

/* Centered Container */
.preloader-container {
    text-align: center;
    position: relative;
}

/* Animated Ring */
.preloader-ring {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 0 auto 2rem;
}

.preloader-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
}

.preloader-ring circle {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
}

.preloader-ring circle:first-child {
    stroke: rgba(74, 158, 255, 0.1);
}

.preloader-ring circle:last-child {
    stroke: url(#gradient);
    stroke-dasharray: 283;
    stroke-dashoffset: 283;
    animation: dash 1.8s ease-in-out infinite;
}

@keyframes dash {
    0% {
        stroke-dashoffset: 283;
    }
    50% {
        stroke-dashoffset: 70;
    }
    100% {
        stroke-dashoffset: 283;
    }
}

/* Text Animation */
.preloader-text {
    margin-top: 1.5rem;
}

.preloader-name {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff 0%, #4a9eff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    font-family: 'Inter', sans-serif;
    animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
    0%, 100% {
        opacity: 0.8;
    }
    50% {
        opacity: 1;
    }
}

.preloader-status {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
}

.preloader-status span {
    display: inline-block;
    animation: blink 1.4s infinite;
}

.preloader-status span:nth-child(2) {
    animation-delay: 0.2s;
}

.preloader-status span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes blink {
    0%, 100% {
        opacity: 0.2;
    }
    50% {
        opacity: 1;
    }
}

/* Gradient Definition */
.preloader-gradient {
    position: absolute;
    width: 0;
    height: 0;
}

/* Loading Percentage */
.preloader-percentage {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #4a9eff, #2196f3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
    font-family: 'Inter', monospace;
    letter-spacing: 2px;
}

/* Minimal Version (Alternative) */
.preloader-minimal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.preloader-minimal .dot {
    width: 12px;
    height: 12px;
    background: #4a9eff;
    border-radius: 50%;
    margin: 0 6px;
    animation: bounce 0.6s infinite alternate;
}

.preloader-minimal .dot:nth-child(2) {
    animation-delay: 0.2s;
    background: #2196f3;
}

.preloader-minimal .dot:nth-child(3) {
    animation-delay: 0.4s;
    background: #64b5f6;
}

@keyframes bounce {
    from {
        transform: translateY(0);
        opacity: 0.5;
    }
    to {
        transform: translateY(-20px);
        opacity: 1;
    }
}

/* Responsive */
@media (max-width: 768px) {
    .preloader-ring {
        width: 60px;
        height: 60px;
    }
    
    .preloader-name {
        font-size: 1.4rem;
    }
    
    .preloader-percentage {
        font-size: 1.5rem;
    }
}

/* Reduced Motion Support */
@media (prefers-reduced-motion: reduce) {
    .preloader-ring circle:last-child {
        animation: none;
        stroke-dashoffset: 0;
    }
    
    .preloader-status span {
        animation: none;
        opacity: 1;
    }
}
</style>

<!-- SVG Gradients -->
<svg class="preloader-gradient" width="0" height="0">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4a9eff" />
            <stop offset="50%" stop-color="#2196f3" />
            <stop offset="100%" stop-color="#64b5f6" />
        </linearGradient>
    </defs>
</svg>

<!-- Preloader HTML - Main Version -->
<div id="preloader" class="preloader">
    <div class="preloader-container">
        <!-- Animated Ring -->
        <div class="preloader-ring">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" />
                <circle cx="50" cy="50" r="45" />
            </svg>
        </div>
        
        <!-- Text -->
        <div class="preloader-text">
            <div class="preloader-name">PORTFOLIO</div>
            <div class="preloader-status">
                <span>L</span>
                <span>O</span>
                <span>A</span>
                <span>D</span>
                <span>I</span>
                <span>N</span>
                <span>G</span>
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </div>
        </div>
    </div>
</div>

<script>
// ===== PROFESSIONAL PRELOADER ===== //
(function() {
    'use strict';
    
    // Configuration
    const CONFIG = {
        minDisplayTime: 800,      // Minimum display time in ms
        maxDisplayTime: 2000,     // Maximum fallback time in ms
        fadeOutDuration: 500       // Fade out duration in ms
    };
    
    let startTime = Date.now();
    let resourcesLoaded = false;
    let preloaderHidden = false;
    
    // Get preloader element
    const preloader = document.getElementById('preloader');
    if (!preloader) return;
    
    // Function to hide preloader
    function hidePreloader() {
        if (preloaderHidden) return;
        preloaderHidden = true;
        
        // Add fade-out class
        preloader.classList.add('fade-out');
        
        // Remove from DOM after animation
        setTimeout(() => {
            preloader.style.display = 'none';
            // Dispatch event for other scripts
            document.dispatchEvent(new CustomEvent('preloader-hidden'));
        }, CONFIG.fadeOutDuration);
    }
    
    // Check if all resources are loaded
    function checkResourcesLoaded() {
        // Get all images, iframes, and scripts
        const resources = Array.from(document.querySelectorAll('img, iframe, [data-src]'));
        
        if (resources.length === 0) {
            resourcesLoaded = true;
            return;
        }
        
        let loadedCount = 0;
        const totalResources = resources.length;
        
        function resourceLoaded() {
            loadedCount++;
            if (loadedCount >= totalResources) {
                resourcesLoaded = true;
                tryToHide();
            }
        }
        
        resources.forEach(resource => {
            if (resource.complete || resource.readyState === 'complete') {
                resourceLoaded();
            } else {
                resource.addEventListener('load', resourceLoaded);
                resource.addEventListener('error', resourceLoaded);
            }
        });
    }
    
    // Try to hide preloader when conditions are met
    function tryToHide() {
        if (resourcesLoaded) {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, CONFIG.minDisplayTime - elapsedTime);
            
            setTimeout(() => {
                hidePreloader();
            }, remainingTime);
        }
    }
    
    // Initialize preloader
    function init() {
        // Check if DOM is already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                checkResourcesLoaded();
                tryToHide();
            });
        } else {
            checkResourcesLoaded();
            tryToHide();
        }
        
        // Fallback timeout
        setTimeout(() => {
            if (!preloaderHidden) {
                hidePreloader();
            }
        }, CONFIG.maxDisplayTime);
        
        // Handle page load complete
        window.addEventListener('load', () => {
            resourcesLoaded = true;
            tryToHide();
        });
    }
    
    // Start preloader
    init();
})();
</script>
